<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA Bill Generator - University of Calicut</title>
    <script src="libs/tailwind.js"></script>
    <script src="libs/jspdf.umd.min.js"></script>
    <script src="libs/jspdf.plugin.autotable.min.js"></script>
    <style type="text/tailwindcss">
        .form-input { 
            @apply w-full p-2 border border-yellow-300 rounded text-sm bg-yellow-100 focus:bg-yellow-200 focus:border-yellow-400 outline-none transition-colors; 
            background-color: #fffde7 !important; 
            border-color: #fdd835 !important;
        }
        .form-input:focus { background-color: #fff59d !important; }
        .btn { @apply px-4 py-2 rounded font-semibold transition; }
        .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700; }
        .btn-secondary { @apply bg-gray-200 text-gray-700 hover:bg-gray-300; }
        .btn-danger { @apply bg-red-500 text-white hover:bg-red-600; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-600">
            <div>
                <h1 class="text-2xl font-bold text-blue-900">TA Bill Generator</h1>

            </div>
            <div class="space-x-2">
                <button onclick="openSettings()" class="btn btn-secondary flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Profile -->
            <div class="lg:col-span-1 space-y-6">
                <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-800">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Personal Profile
                    </h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name (Block Letters)</label>
                            <input type="text" id="prof-name" class="form-input">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Designation</label>
                            <input type="text" id="prof-designation" class="form-input" list="designation-list">
                            <datalist id="designation-list">
                                <option value="Assistant Professor"></option>
                                <option value="Associate Professor"></option>
                                <option value="Professor"></option>
                                <option value="Assistant Professor on Contract"></option>
                            </datalist>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Name of College</label>
                            <div class="relative" id="prof-college-wrap">
                                <input type="text" id="prof-college" autocomplete="off"
                                    class="form-input pr-8"
                                    placeholder="Type 3+ letters to search…">
                                <button type="button" id="prof-college-clear"
                                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden text-base font-bold leading-none focus:outline-none"
                                    title="Clear">✕</button>
                                <div id="prof-college-dropdown"
                                    class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-2xl mt-1 max-h-52 overflow-y-auto hidden text-left">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Permanent Address</label>
                            <textarea id="prof-address" class="form-input h-20"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Basic Pay</label>
                                <input type="number" id="prof-basic-pay" class="form-input">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Grade</label>
                                <input type="text" id="prof-grade" class="form-input bg-gray-50" readonly placeholder="Auto-calculated">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-800">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                        Bank Details
                    </h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">SB Account No</label>
                            <input type="text" id="prof-acc-no" class="form-input">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Bank & IFSC</label>
                            <input type="text" id="prof-bank-ifsc" class="form-input">
                        </div>
                    </div>
                </section>
                
                <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-blue-800">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Bill Context
                    </h2>
                    <div class="space-y-3">

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Purpose of Journey</label>
                            <textarea id="bill-purpose" class="form-input h-24"></textarea>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Journey Table -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Quick Entry Section -->
                <section class="bg-blue-900 p-6 rounded-lg shadow-md text-white">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Quick Journey Entry
                        </h2>
                        <button onclick="clearQuickFields()" class="text-xs text-blue-300 hover:text-white underline focus:outline-none">Clear</button>
                    </div>

                    <!-- All fields stacked vertically, responsive 2-col on md+ -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <!-- FROM -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold uppercase opacity-70 tracking-wide">From College</label>
                            <div class="relative" id="quick-from-wrap">
                                <input type="text" id="quick-from" autocomplete="off"
                                    class="w-full p-2 pr-8 rounded text-gray-900 text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                                    placeholder="Type 3+ letters to search…">
                                <button type="button" id="quick-from-clear"
                                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden text-base font-bold leading-none focus:outline-none"
                                    title="Clear">✕</button>
                                <div id="quick-from-dropdown"
                                    class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-2xl mt-1 max-h-52 overflow-y-auto hidden text-left">
                                </div>
                            </div>
                        </div>
                        <!-- TO -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold uppercase opacity-70 tracking-wide">To College</label>
                            <div class="relative" id="quick-to-wrap">
                                <input type="text" id="quick-to" autocomplete="off"
                                    class="w-full p-2 pr-8 rounded text-gray-900 text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                                    placeholder="Type 3+ letters to search…">
                                <button type="button" id="quick-to-clear"
                                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden text-base font-bold leading-none focus:outline-none"
                                    title="Clear">✕</button>
                                <div id="quick-to-dropdown"
                                    class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-2xl mt-1 max-h-52 overflow-y-auto hidden text-left">
                                </div>
                            </div>
                        </div>
                        <!-- ONWARD DATE & TIME -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold uppercase opacity-70 tracking-wide">Onward Date &amp; Time</label>
                            <div class="flex gap-2">
                                <input type="date" id="quick-date-onward"
                                    class="flex-1 p-2 rounded text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                                <input type="time" id="quick-time-onward" value="08:00"
                                    class="w-24 p-2 rounded text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                            </div>
                        </div>
                        <!-- RETURN DATE & TIME -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold uppercase opacity-70 tracking-wide">Return Date &amp; Time <span class="normal-case opacity-60 text-[9px]">(optional)</span></label>
                            <div class="flex gap-2">
                                <input type="date" id="quick-date-return"
                                    class="flex-1 p-2 rounded text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                                <input type="time" id="quick-time-return" value="16:00"
                                    class="w-24 p-2 rounded text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                            </div>
                        </div>
                    </div>

                    <button onclick="generateQuickJourney()"
                        class="mt-4 w-full bg-blue-500 hover:bg-blue-400 active:bg-blue-600 text-white font-bold py-2.5 rounded transition flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Auto-Fill Journey Log
                    </button>
                </section>

                <!-- Journey Log -->
                <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-blue-800">Journey Log</h2>
                        <button onclick="addJourneyRow()" class="btn btn-secondary text-xs flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Row
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm" id="journey-table">
                            <thead class="bg-gray-50 text-gray-600 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="p-2 border-b w-40">Date &amp; Time</th>
                                    <th class="p-2 border-b">From</th>
                                    <th class="p-2 border-b">To</th>
                                    <th class="p-2 border-b">Mode</th>
                                    <th class="p-2 border-b w-20">Dist (Km)</th>
                                    <th class="p-2 border-b w-24">Fare (Rs)</th>
                                    <th class="p-2 border-b w-24">DA (Rs)</th>
                                    <th class="p-2 border-b w-10"></th>
                                </tr>
                            </thead>
                            <tbody id="journey-body">
                                <!-- Dynamic Rows -->
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-6 p-4 bg-blue-50 rounded-lg flex justify-between items-center">
                        <div class="text-blue-900 font-bold">Total Claim: <span id="total-amount" class="text-xl">₹ 0.00</span></div>
                        <div class="text-xs text-blue-700 font-medium">Auto-calculating based on University rates</div>
                    </div>
                </section>

                <!-- Generate Actions — below all journey legs -->
                <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-4 flex flex-col sm:flex-row justify-end gap-3">
                    <div class="flex-1 flex items-center text-sm text-gray-500">
                        <svg class="w-4 h-4 mr-1.5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Review all legs before generating
                    </div>
                    <button onclick="generateHTMLBill()" class="btn btn-secondary flex items-center justify-center gap-2 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        Generate HTML
                    </button>
                    <button onclick="generatePDF()" class="btn btn-primary flex items-center justify-center gap-2 text-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Generate PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Rate Configuration</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-6" id="settings-content">
                <!-- Dynamic Rate Inputs -->
            </div>
            <div class="p-6 border-t bg-gray-50 flex justify-end gap-3 rounded-b-xl">
                <button onclick="resetRates()" class="btn btn-secondary">Reset to Default</button>
                <button onclick="saveSettings()" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
