<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA Bill Generator - University of Calicut</title>
    <script src="libs/tailwind.js"></script>
    <script src="libs/jspdf.umd.min.js"></script>
    <script src="libs/jspdf.plugin.autotable.min.js"></script>
    <style type="text/tailwindcss">
        .form-input {
            @apply w-full p-2 border border-yellow-300 rounded text-sm bg-yellow-50 focus:bg-yellow-100 focus:border-yellow-400 outline-none transition-colors;
        }
        .form-input:focus { background-color: #fff9c4 !important; }
        .btn { @apply px-4 py-2.5 rounded-lg font-semibold transition text-sm; }
        .btn-primary { @apply bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800; }
        .btn-secondary { @apply bg-gray-100 text-gray-700 hover:bg-gray-200 active:bg-gray-300 border border-gray-200; }
        .btn-danger { @apply bg-red-500 text-white hover:bg-red-600; }
        .card { @apply bg-white rounded-xl shadow-sm border border-gray-100 p-4; }
        .section-title { @apply text-sm font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2; }
        /* Journey card styles */
        .journey-card { @apply bg-white border border-gray-200 rounded-xl p-3 mb-2 shadow-sm transition hover:shadow-md; }
        .journey-card.da-card { @apply bg-blue-50 border-blue-200; }
        .journey-card .field-label { @apply text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-0.5; }
        .journey-card input, .journey-card select {
            @apply w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-white focus:border-blue-400 focus:ring-1 focus:ring-blue-100 outline-none transition;
        }
        .journey-card .mini-input {
            @apply border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-white focus:border-blue-400 outline-none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <div class="max-w-2xl mx-auto px-3 py-4 md:px-6 md:py-8">

        <!-- Header -->
        <div class="flex justify-between items-center mb-5">
            <div>
                <h1 class="text-xl font-bold text-blue-900 leading-tight">TA Bill Generator</h1>
                <p class="text-xs text-gray-400 mt-0.5">University of Calicut · Pareeksha Bhavan</p>
            </div>
            <button onclick="openSettings()" class="p-2.5 rounded-xl bg-white border border-gray-200 shadow-sm text-gray-500 hover:text-blue-600 hover:border-blue-300 transition" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>

        <!-- Personal Profile -->
        <div class="card mb-4">
            <div class="section-title">
                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                Personal Profile
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Full Name</label>
                    <input type="text" id="prof-name" class="form-input">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Designation</label>
                        <input type="text" id="prof-designation" class="form-input" list="designation-list">
                        <datalist id="designation-list">
                            <option value="Assistant Professor"></option>
                            <option value="Associate Professor"></option>
                            <option value="Professor"></option>
                            <option value="Assistant Professor on Contract"></option>
                        </datalist>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Basic Pay</label>
                        <input type="number" id="prof-basic-pay" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">College</label>
                    <div class="relative" id="prof-college-wrap">
                        <input type="text" id="prof-college" autocomplete="off" class="form-input pr-8" placeholder="Type 3+ letters to search…">
                        <button type="button" id="prof-college-clear" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden text-base font-bold leading-none focus:outline-none" title="Clear">✕</button>
                        <div id="prof-college-dropdown" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-2xl mt-1 max-h-52 overflow-y-auto hidden text-left"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Grade</label>
                        <select id="prof-grade" class="form-input" onchange="saveFormState(); updateCalculations();"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">SB Account No</label>
                        <input type="text" id="prof-acc-no" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Bank &amp; IFSC</label>
                    <input type="text" id="prof-bank-ifsc" class="form-input">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Permanent Address</label>
                    <textarea id="prof-address" class="form-input h-16 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Purpose of Journey</label>
                    <textarea id="bill-purpose" class="form-input h-16 resize-none"></textarea>
                </div>
            </div>
        </div>

        <!-- Quick Journey Entry -->
        <div class="bg-blue-900 rounded-xl p-4 mb-4 shadow-md text-white">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span class="font-bold text-sm">Quick Journey Entry</span>
                </div>
                <button onclick="clearQuickFields()" class="text-xs text-blue-300 hover:text-white underline focus:outline-none">Clear</button>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <!-- FROM -->
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-60 tracking-wide">From College</label>
                    <div class="relative mt-1" id="quick-from-wrap">
                        <input type="text" id="quick-from" autocomplete="off"
                            class="w-full p-2.5 pr-8 rounded-lg text-gray-900 text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                            placeholder="Type 3+ letters…">
                        <button type="button" id="quick-from-clear" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden text-base font-bold leading-none focus:outline-none" title="Clear">✕</button>
                        <div id="quick-from-dropdown" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-2xl mt-1 max-h-52 overflow-y-auto hidden text-left"></div>
                    </div>
                </div>
                <!-- TO -->
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-60 tracking-wide">To College</label>
                    <div class="relative mt-1" id="quick-to-wrap">
                        <input type="text" id="quick-to" autocomplete="off"
                            class="w-full p-2.5 pr-8 rounded-lg text-gray-900 text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                            placeholder="Type 3+ letters…">
                        <button type="button" id="quick-to-clear" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 hidden text-base font-bold leading-none focus:outline-none" title="Clear">✕</button>
                        <div id="quick-to-dropdown" class="absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-2xl mt-1 max-h-52 overflow-y-auto hidden text-left"></div>
                    </div>
                </div>
                <!-- DATES & TIMES -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-60 tracking-wide">Onward Date</label>
                        <input type="date" id="quick-date-onward" class="mt-1 w-full p-2.5 rounded-lg text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-60 tracking-wide">Onward Time</label>
                        <input type="time" id="quick-time-onward" value="08:00" class="mt-1 w-full p-2.5 rounded-lg text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-60 tracking-wide">Return Date <span class="normal-case opacity-60">(opt)</span></label>
                        <input type="date" id="quick-date-return" class="mt-1 w-full p-2.5 rounded-lg text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase opacity-60 tracking-wide">Return Time <span class="normal-case opacity-60">(opt)</span></label>
                        <input type="time" id="quick-time-return" value="16:00" class="mt-1 w-full p-2.5 rounded-lg text-gray-900 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                </div>
            </div>
            <button onclick="generateQuickJourney()"
                class="mt-4 w-full bg-blue-500 hover:bg-blue-400 active:bg-blue-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Auto-Fill Journey Log
            </button>
        </div>

        <!-- Journey Log -->
        <div class="card mb-4">
            <div class="flex justify-between items-center mb-3">
                <div class="section-title mb-0">
                    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    Journey Log
                </div>
                <button onclick="addJourneyRow()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 hover:bg-blue-100 text-xs font-semibold transition border border-blue-100">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    Add Leg
                </button>
            </div>

            <!-- Card-based journey list -->
            <div id="journey-body" class="space-y-2">
                <!-- Dynamic Cards -->
            </div>

            <!-- Total -->
            <div class="mt-4 p-3 bg-gradient-to-r from-blue-600 to-blue-700 rounded-xl flex justify-between items-center text-white">
                <div class="text-xs font-semibold opacity-80">Total Claim</div>
                <div class="text-xl font-bold" id="total-amount">₹ 0.00</div>
            </div>
        </div>

        <!-- Generate Actions -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="generateHTMLBill()" class="btn btn-secondary flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                HTML Bill
            </button>
            <button onclick="generatePDF()" class="btn btn-primary flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Generate PDF
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="text-lg font-bold">Rate Configuration</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 space-y-6" id="settings-content"></div>
            <div class="p-5 border-t bg-gray-50 flex justify-end gap-3 rounded-b-xl">
                <button onclick="resetRates()" class="btn btn-secondary">Reset to Default</button>
                <button onclick="saveSettings()" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="pdf_func.js?v=7"></script>
    <script src="app.js?v=7"></script>
</body>
</html>
